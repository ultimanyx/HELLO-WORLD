<!doctype html>
<html>
  <head>
    <title>Visit Log</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="sidebar">
      <h2>School Clinic</h2>
      <a href="dashboard.html">Dashboard</a>
      <a href="students.html">Students</a>
      <a href="visit-log.html">Visit Log</a>
      <a href="inventory.html">Inventory</a>
      <a href="index.html">Logout</a>
    </div>

    <div class="main">
      <h1>Clinic Visit Log</h1>

      <form>
        <input type="text" placeholder="Student ID" />
        <input type="text" placeholder="Student Name" />
        <input type="date" />
        <textarea placeholder="Complaint"></textarea>

        <h3>Medicine Given</h3>
        <select>
          <option>Paracetamol (Stock: 20)</option>
          <option>Ibuprofen (Stock: 15)</option>
          <option>Cough Syrup (Stock: 10)</option>
        </select>

        <input type="number" placeholder="Quantity Given" />

        <button type="submit">Save Visit</button>
      </form>
    </div>

    <div class="sidebar">
      <h2>School Clinic</h2>
      <a href="dashboard.html">Dashboard</a>

    </div>
  </body>
